<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agnes Cards | Premium Anime Arena</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

   
</head>
<body>

    <header>
        <h1 class="main-title">Agnes cards</h1>
        <p class="subtitle">Premium Anime Tactical Arena</p>
    </header>

    <main class="container">
        
        <section>
            <div class="section-header">
                <span>Selecionar Campo de Batalha</span>
            </div>
            <div class="stage-grid">
                <div class="stage-card active-stage" onclick="mudarCenario(this)">
                    <div class="stage-placeholder"></div>
                    <div class="stage-info">Torneio de Dark Tournament</div>
                </div>
                <div class="stage-card" onclick="mudarCenario(this)">
                    <div class="stage-placeholder"></div>
                    <div class="stage-info">Campos de Gelo de Juto</div>
                </div>
                <div class="stage-card" onclick="mudarCenario(this)">
                    <div class="stage-placeholder"></div>
                    <div class="stage-info">Ruínas de Shiganshina</div>
                </div>
            </div>
        </section>

        <section class="control-panel">
            <button class="btn-battle" id="btnAction" onclick="executarFaseBatalha()">Iniciar Batalha</button>
        </section>

        <section class="battle-arena">
            
            <div class="team-side ally">
                <div class="team-header">
                    <span>Seu Time</span>
                    <span id="score-ally">SCORE: --</span>
                </div>
                <div class="slots-container" id="container-ally">
                    <div class="empty-slot">Slot Vazio</div>
                    <div class="empty-slot">Slot Vazio</div>
                    <div class="empty-slot">Slot Vazio</div>
                </div>
            </div>

            <div class="vs-badge">VS</div>

            <div class="team-side enemy">
                <div class="team-header">
                    <span>Time Inimigo</span>
                    <span id="score-enemy">SCORE: --</span>
                </div>
                <div class="slots-container" id="container-enemy">
                    <div class="empty-slot">Slot Vazio</div>
                    <div class="empty-slot">Slot Vazio</div>
                    <div class="empty-slot">Slot Vazio</div>
                </div>
            </div>

        </section>
    </main>

    <div class="overlay-result" id="modalResult">
        <div class="modal-box">
            <div class="modal-verdict" id="modalVerdict">VITÓRIA!</div>
            <div class="modal-summary" id="modalSummary">Seu Time (000) vs (000) Time Inimigo</div>
            <button class="btn-close-modal" onclick="fecharResultado()">Remontar Deck</button>
        </div>
    </div>

    <script>
        // Banco de Dados Premium de Combatentes (Id Imagem usando IDs fixos e variados do Picsum)
        const dbPersonagens = [
            { nome: "Son Goku", poder: 99, imgId: "1025" },
            { nome: "Naruto Uzumaki", poder: 92, imgId: "1062" },
            { nome: "Monkey D. Luffy", poder: 94, imgId: "1074" },
            { nome: "Levi Ackerman", poder: 88, imgId: "1084" },
            { nome: "Gojo Satoru", poder: 98, imgId: "16" },
            { nome: "Roronoa Zoro", poder: 90, imgId: "26" },
            { nome: "Saitama", poder: 100, imgId: "38" },
            { nome: "Sukuna", poder: 97, imgId: "42" },
            { nome: "Killua Zoldyck", poder: 86, imgId: "64" },
            { nome: "Vegeta", poder: 96, imgId: "84" }
        ];

        // Lógica de manipulação visual das Arenas/Cenários
        function mudarCenario(cardAlvo) {
            document.querySelectorAll('.stage-card').forEach(card => {
                card.classList.remove('active-stage');
            });
            cardAlvo.classList.add('active-stage');
        }

        // Construtor Estrutural do Elemento HTML do Card
        function renderizarCardFighter(fighter, delay) {
            return `
                <div class="card-fighter" style="animation-delay: ${delay}s">
                    <div class="card-banner" style="background-image: url('https://picsum.photos/id/${fighter.imgId}/300/400')"></div>
                    <div class="card-title">${fighter.nome}</div>
                    <div class="card-power-row">
                        <span class="power-label">POWER</span>
                        <span class="power-value">${fighter.poder}</span>
                    </div>
                </div>
            `;
        }

        // Lógica Principal de Invocação, Processamento e Julgamento das Pontuações
        function executarFaseBatalha() {
            const btn = document.getElementById('btnAction');
            btn.disabled = true;
            btn.innerText = "SORTEANDO DECK...";

            // Sorteia 6 combatentes aleatórios únicos sem repetição
            const deckSorteado = [...dbPersonagens].sort(() => 0.5 - Math.random());
            
            const aliados = [deckSorteado[0], deckSorteado[1], deckSorteado[2]];
            const inimigos = [deckSorteado[3], deckSorteado[4], deckSorteado[5]];

            // Renderização dos cards com atrasos incrementais (Delay Efeito Cascata)
            const boxAlly = document.getElementById('container-ally');
            const boxEnemy = document.getElementById('container-enemy');

            boxAlly.innerHTML = renderizarCardFighter(aliados[0], 0) + renderizarCardFighter(aliados[1], 0.1) + renderizarCardFighter(aliados[2], 0.2);
            boxEnemy.innerHTML = renderizarCardFighter(inimigos[0], 0.3) + renderizarCardFighter(inimigos[1], 0.4) + renderizarCardFighter(inimigos[2], 0.5);

            // Cálculo Matemático da Força Total das Linhas de Frente
            const somaAlly = aliados.reduce((total, p) => total + p.poder, 0);
            const somaEnemy = inimigos.reduce((total, p) => total + p.poder, 0);

            // Exibe scores parciais nas caixas de equipes
            document.getElementById('score-ally').innerText = `SCORE: ${somaAlly}`;
            document.getElementById('score-enemy').innerText = `SCORE: ${somaEnemy}`;

            // Timeout Estratégico (1.5s) para o clímax dramático do veredito
            setTimeout(() => {
                const modal = document.getElementById('modalResult');
                const verdictText = document.getElementById('modalVerdict');
                const summaryText = document.getElementById('modalSummary');

                summaryText.innerText = `Seu Time (${somaAlly} PTS) vs (${somaEnemy} PTS) Time Inimigo`;

                if (somaAlly > somaEnemy) {
                    verdictText.innerText = "Vitória do Seu Time!";
                    verdictText.className = "modal-verdict verdict-win";
                } else if (somaEnemy > somaAlly) {
                    verdictText.innerText = "Derrota!";
                    verdictText.className = "modal-verdict verdict-lose";
                } else {
                    verdictText.innerText = "Empate Perfeito!";
                    verdictText.className = "modal-verdict verdict-draw";
                }

                modal.style.display = 'flex';
                btn.disabled = false;
                btn.innerText = "REINICIAR BATALHA";
            }, 1500);
        }

        // Fecha o painel de modal e limpa os campos para uma nova partida
        function fecharResultado() {
            document.getElementById('modalResult').style.display = 'none';
        }
    </script>
</body>
</html>
